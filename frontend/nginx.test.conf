# nginx.test.conf — test frontend nginx, listens on 8081
# Used by docker-compose.test.yml for the /test staging environment
# Identical to nginx.conf except ports (8081 listen, 3011 backend, 3012 mcp-server)
# NPM strips /test/ prefix before forwarding, so this config does NOT need /test awareness
server {
    listen 8081;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'" always;

    # Request size limit
    client_max_body_size 64k;

    # Gzip compression — covers static assets AND proxied API responses.
    # NPM (the outer reverse proxy) strips Accept-Encoding before forwarding here,
    # then re-compresses with its own gzip, but only for types it knows about.
    # We compress everything here so even direct-to-8080 requests benefit.
    gzip on;
    gzip_types application/javascript application/json text/css text/plain text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;

    # Hashed asset filenames are immutable — cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # index.html MUST NOT be heuristically cached by browsers. Without an
    # explicit Cache-Control, browsers will keep serving the last-seen
    # copy for minutes/hours, meaning users stay stuck on the pre-deploy
    # SPA version — including the legacy-domain redirect script that
    # lives inside index.html. "no-cache" still allows conditional
    # revalidation via ETag/If-None-Match (cheap 304), it just forces the
    # browser to check on every page load.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- MCP server (port 3012) ---
    # Public path is /mcp-api/*, internal paths are bare (/mcp, /key, /health,
    # /webhooks/patreon). Strip the /mcp-api prefix before forwarding.
    # The trailing slash on proxy_pass is what performs the rewrite.
    # Allow larger bodies: MCP JSON-RPC tool calls can exceed the 64 KB
    # document limit we enforce on /api/.
    location /mcp-api/ {
        client_max_body_size 1m;
        proxy_pass http://127.0.0.1:3012/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # MCP streamable HTTP: disable response buffering so server-sent
        # events and long-poll responses are streamed immediately.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
