services:
  db:
    image: postgres:17-alpine
    network_mode: host
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jlc}
      POSTGRES_USER: ${POSTGRES_USER:-jlc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=2GB
      -c work_mem=32MB
      -c jit=off
      -c random_page_cost=1.1
      -c effective_cache_size=5GB
      -c effective_io_concurrency=200
      -c huge_pages=try
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jlc"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    network_mode: host
    volumes:
      - img_cache:/app/data/img
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      PORT: "3001"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    network_mode: host
    depends_on:
      - backend
    restart: unless-stopped

  npm:
    image: jc21/nginx-proxy-manager:latest
    network_mode: host
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    environment:
      DISABLE_IPV6: "true"
    depends_on:
      - frontend
    restart: unless-stopped

  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    network_mode: host
    volumes:
      - img_cache:/app/data/img
      - raw_data:/app/data/raw
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      JLCPARTS_BASE: https://yaqwsx.github.io/jlcparts
      INGEST_CONCURRENCY: "4"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  pg_data:
  img_cache:
  raw_data:
  npm_data:
  npm_letsencrypt:
