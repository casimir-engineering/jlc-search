services:
  db:
    image: postgres:17-alpine
    network_mode: host
    environment:
      POSTGRES_DB: jst
      POSTGRES_USER: jst
      POSTGRES_PASSWORD: jst
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jst"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    network_mode: host
    volumes:
      - img_cache:/app/data/img
    environment:
      DATABASE_URL: postgres://jst:jst@localhost:5432/jst
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    network_mode: host
    depends_on:
      - backend
    restart: unless-stopped

  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    network_mode: host
    volumes:
      - img_cache:/app/data/img
    environment:
      DATABASE_URL: postgres://jst:jst@localhost:5432/jst
      JLCPARTS_BASE: https://yaqwsx.github.io/jlcparts
      INGEST_CONCURRENCY: "4"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  pg_data:
  img_cache:
